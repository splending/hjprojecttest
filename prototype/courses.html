<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>高校统一门户 - 我的课程</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1dQIxhFqefF5eDjK7uHk5j0i5dMGdg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <style>
      body {
        background: #e2e8f0;
        font-family: 'Inter', 'SF Pro Display', 'PingFang SC', sans-serif;
      }
      .device-frame {
        width: 393px;
        height: 852px;
        border-radius: 38px;
        overflow: hidden;
        box-shadow: 0 20px 45px rgba(15, 23, 42, 0.25);
        margin: 40px auto;
        border: 12px solid #111827;
        background: #f8fafc;
      }
      .status-bar {
        height: 44px;
        padding: 0 18px;
      }
      .tab-bar {
        height: 86px;
        border-top: 1px solid rgba(148, 163, 184, 0.35);
        backdrop-filter: blur(12px);
      }
    </style>
  </head>
  <body>
    <div class="device-frame">
      <div class="flex flex-col h-full">
        <div class="status-bar flex items-end justify-between text-slate-900 text-[13px]">
          <span class="font-semibold">9:41</span>
          <div class="flex items-center space-x-1 text-[11px]">
            <i class="fa-solid fa-signal"></i>
            <i class="fa-solid fa-wifi"></i>
            <i class="fa-solid fa-battery-full"></i>
          </div>
        </div>
        <main class="flex-1 overflow-y-auto bg-gradient-to-b from-white to-slate-100 px-6 pb-6">
          <header class="mt-2 mb-4">
            <div class="flex items-center justify-between">
              <div>
                <h1 class="text-2xl font-semibold text-slate-900">我的课程</h1>
                <p class="text-sm text-slate-500 mt-1">本周共有 18 节课程，保持良好学习节奏。</p>
              </div>
              <button class="px-4 py-2 bg-blue-600 text-white text-sm font-medium rounded-full shadow">导出课表</button>
            </div>
          </header>

          <section class="bg-white rounded-3xl p-4 shadow-sm">
            <div class="flex items-center justify-between">
              <div>
                <p class="text-xs text-slate-500 uppercase tracking-[0.2em]">本周</p>
                <h2 class="text-lg font-semibold text-slate-900">课表总览</h2>
              </div>
              <div class="flex items-center space-x-2 text-sm text-slate-500">
                <button class="px-3 py-1 rounded-full border border-slate-200">周</button>
                <button class="px-3 py-1 rounded-full bg-blue-50 text-blue-600 border border-blue-100">日</button>
              </div>
            </div>
            <div class="grid grid-cols-7 gap-2 mt-4 text-center text-xs">
              <div class="flex flex-col items-center py-2 rounded-2xl bg-blue-600 text-white">
                <span>周一</span>
                <span class="font-semibold text-base">27</span>
              </div>
              <div class="flex flex-col items-center py-2 rounded-2xl bg-slate-100 text-slate-600">
                <span>周二</span>
                <span class="font-semibold text-base">28</span>
              </div>
              <div class="flex flex-col items-center py-2 rounded-2xl bg-slate-100 text-slate-600">
                <span>周三</span>
                <span class="font-semibold text-base">29</span>
              </div>
              <div class="flex flex-col items-center py-2 rounded-2xl bg-slate-100 text-slate-600">
                <span>周四</span>
                <span class="font-semibold text-base">30</span>
              </div>
              <div class="flex flex-col items-center py-2 rounded-2xl bg-slate-100 text-slate-600">
                <span>周五</span>
                <span class="font-semibold text-base">31</span>
              </div>
              <div class="flex flex-col items-center py-2 rounded-2xl bg-slate-50 text-slate-400">
                <span>周六</span>
                <span class="font-semibold text-base">1</span>
              </div>
              <div class="flex flex-col items-center py-2 rounded-2xl bg-slate-50 text-slate-400">
                <span>周日</span>
                <span class="font-semibold text-base">2</span>
              </div>
            </div>
          </section>

          <section class="mt-6 space-y-4">
            <article class="bg-white rounded-3xl shadow-sm p-4 flex items-center space-x-4">
              <div class="w-16 h-16 rounded-2xl overflow-hidden">
                <img
                  src="https://images.unsplash.com/photo-1523475472560-d2df97ec485c?auto=format&fit=crop&w=500&q=80"
                  alt="编程课堂"
                  class="w-full h-full object-cover"
                />
              </div>
              <div class="flex-1">
                <div class="flex items-center justify-between text-xs text-slate-500">
                  <span>周一 08:30-10:05</span>
                  <span>教学楼 A203</span>
                </div>
                <h3 class="text-lg font-semibold text-slate-900 mt-1">计算机网络</h3>
                <p class="text-sm text-slate-500">张伟 · 第 9-16 周 · 支持在线直播</p>
              </div>
              <button class="text-blue-600 text-sm font-medium">资料</button>
            </article>

            <article class="bg-white rounded-3xl shadow-sm p-4 flex items-center space-x-4">
              <div class="w-16 h-16 rounded-2xl overflow-hidden">
                <img
                  src="https://images.unsplash.com/photo-1498050108023-c5249f4df085?auto=format&fit=crop&w=500&q=80"
                  alt="设计课堂"
                  class="w-full h-full object-cover"
                />
              </div>
              <div class="flex-1">
                <div class="flex items-center justify-between text-xs text-slate-500">
                  <span>周一 10:20-11:55</span>
                  <span>信息楼 402</span>
                </div>
                <h3 class="text-lg font-semibold text-slate-900 mt-1">数据可视化设计</h3>
                <p class="text-sm text-slate-500">王蕾 · 第 9-16 周 · 小组项目进行中</p>
              </div>
              <button class="text-blue-600 text-sm font-medium">作业</button>
            </article>

            <article class="bg-white rounded-3xl shadow-sm p-4 flex items-center space-x-4">
              <div class="w-16 h-16 rounded-2xl overflow-hidden">
                <img
                  src="https://images.unsplash.com/photo-1509062522246-3755977927d7?auto=format&fit=crop&w=500&q=80"
                  alt="实验室"
                  class="w-full h-full object-cover"
                />
              </div>
              <div class="flex-1">
                <div class="flex items-center justify-between text-xs text-slate-500">
                  <span>周三 14:00-16:35</span>
                  <span>实验中心 3F</span>
                </div>
                <h3 class="text-lg font-semibold text-slate-900 mt-1">人工智能实践</h3>
                <p class="text-sm text-slate-500">刘洋 · 第 9-16 周 · 需提前预定实验位</p>
              </div>
              <button class="text-blue-600 text-sm font-medium">签到</button>
            </article>
          </section>
        </main>
        <nav class="tab-bar bg-white/90 px-6 flex items-center justify-between text-xs text-slate-500">
          <a class="flex flex-col items-center"><i class="fa-solid fa-house text-lg"></i><span class="mt-1">首页</span></a>
          <a class="flex flex-col items-center text-blue-600"><i class="fa-solid fa-book text-lg"></i><span class="mt-1">课程</span></a>
          <a class="flex flex-col items-center"><i class="fa-solid fa-newspaper text-lg"></i><span class="mt-1">资讯</span></a>
          <a class="flex flex-col items-center"><i class="fa-solid fa-grip text-lg"></i><span class="mt-1">服务</span></a>
          <a class="flex flex-col items-center"><i class="fa-solid fa-user text-lg"></i><span class="mt-1">我的</span></a>
        </nav>
      </div>
    </div>
  </body>
</html>
