<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>高校统一门户 - 个人中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1dQIxhFqefF5eDjK7uHk5j0i5dMGdg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <style>
      body {
        background: #e2e8f0;
        font-family: 'Inter', 'SF Pro Display', 'PingFang SC', sans-serif;
      }
      .device-frame {
        width: 393px;
        height: 852px;
        border-radius: 38px;
        overflow: hidden;
        box-shadow: 0 20px 45px rgba(15, 23, 42, 0.25);
        margin: 40px auto;
        border: 12px solid #111827;
        background: #f8fafc;
      }
      .status-bar {
        height: 44px;
        padding: 0 18px;
      }
      .tab-bar {
        height: 86px;
        border-top: 1px solid rgba(148, 163, 184, 0.35);
        backdrop-filter: blur(12px);
      }
    </style>
  </head>
  <body>
    <div class="device-frame">
      <div class="flex flex-col h-full">
        <div class="status-bar flex items-end justify-between text-slate-900 text-[13px]">
          <span class="font-semibold">9:41</span>
          <div class="flex items-center space-x-1 text-[11px]">
            <i class="fa-solid fa-signal"></i>
            <i class="fa-solid fa-wifi"></i>
            <i class="fa-solid fa-battery-full"></i>
          </div>
        </div>
        <main class="flex-1 overflow-y-auto bg-gradient-to-b from-white to-slate-100 px-6 pb-6">
          <section class="relative mt-2">
            <div class="rounded-3xl overflow-hidden shadow-lg">
              <img
                src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?auto=format&fit=crop&w=1000&q=80"
                alt="个人封面"
                class="w-full h-44 object-cover"
              />
              <div class="absolute bottom-6 left-6 flex items-center space-x-4">
                <img
                  src="https://images.unsplash.com/photo-1524504388940-b1c1722653e1?auto=format&fit=crop&w=200&q=80"
                  alt="头像"
                  class="w-20 h-20 rounded-full border-4 border-white object-cover"
                />
                <div class="text-white drop-shadow">
                  <h1 class="text-2xl font-semibold">李思雨</h1>
                  <p class="text-sm text-white/80">2021 级 · 交互设计 · 学号 2021081602</p>
                </div>
              </div>
            </div>
          </section>

          <section class="mt-6">
            <div class="grid grid-cols-2 gap-4">
              <div class="bg-white rounded-3xl shadow-sm p-4">
                <h2 class="text-sm text-slate-500">数字校园卡</h2>
                <p class="text-xl font-semibold text-slate-900 mt-2">¥ 258.60</p>
                <p class="text-xs text-slate-400 mt-1">余额充足，可用于餐饮/打印/门禁</p>
                <button class="mt-4 w-full bg-blue-600 text-white text-sm py-2 rounded-full">扫码支付</button>
              </div>
              <div class="bg-white rounded-3xl shadow-sm p-4">
                <h2 class="text-sm text-slate-500">校园钱包</h2>
                <p class="text-xl font-semibold text-slate-900 mt-2">¥ 1,280.00</p>
                <p class="text-xs text-slate-400 mt-1">奖学金已到账，可申请转出</p>
                <button class="mt-4 w-full bg-blue-100 text-blue-600 text-sm py-2 rounded-full">提现</button>
              </div>
            </div>
          </section>

          <section class="mt-6">
            <div class="bg-white rounded-3xl shadow-sm divide-y divide-slate-100">
              <div class="flex items-center justify-between px-5 py-4">
                <div class="flex items-center space-x-3">
                  <div class="w-10 h-10 rounded-2xl bg-blue-100 text-blue-600 flex items-center justify-center">
                    <i class="fa-solid fa-id-card"></i>
                  </div>
                  <div>
                    <h3 class="text-base font-semibold text-slate-900">身份与权限</h3>
                    <p class="text-xs text-slate-500">学生 · 创新创业中心助理 · 校园 Wi-Fi 自动登录</p>
                  </div>
                </div>
                <i class="fa-solid fa-chevron-right text-slate-300"></i>
              </div>
              <div class="flex items-center justify-between px-5 py-4">
                <div class="flex items-center space-x-3">
                  <div class="w-10 h-10 rounded-2xl bg-emerald-100 text-emerald-600 flex items-center justify-center">
                    <i class="fa-solid fa-shield"></i>
                  </div>
                  <div>
                    <h3 class="text-base font-semibold text-slate-900">认证状态</h3>
                    <p class="text-xs text-slate-500">面部识别 + 指纹 + 动态口令 已开启</p>
                  </div>
                </div>
                <span class="text-xs text-emerald-500">安全</span>
              </div>
              <div class="flex items-center justify-between px-5 py-4">
                <div class="flex items-center space-x-3">
                  <div class="w-10 h-10 rounded-2xl bg-amber-100 text-amber-600 flex items-center justify-center">
                    <i class="fa-solid fa-gift"></i>
                  </div>
                  <div>
                    <h3 class="text-base font-semibold text-slate-900">校园积分</h3>
                    <p class="text-xs text-slate-500">累计 1,280 分，可兑换文创礼品</p>
                  </div>
                </div>
                <button class="text-blue-600 text-sm">去兑换</button>
              </div>
            </div>
          </section>

          <section class="mt-6 mb-6">
            <div class="bg-gradient-to-r from-blue-500 to-indigo-500 text-white rounded-3xl p-5 shadow-lg flex items-center">
              <img
                src="https://images.unsplash.com/photo-1518608379620-16b0f0d1dfd0?auto=format&fit=crop&w=200&q=80"
                alt="健康码"
                class="w-24 h-24 object-cover rounded-2xl"
              />
              <div class="ml-4 flex-1">
                <p class="text-xs uppercase tracking-[0.3em] text-blue-100">健康服务</p>
                <h2 class="text-xl font-semibold">智慧通行码</h2>
                <p class="text-sm text-blue-100 mt-2">门禁、乘车、活动签到一码通用。</p>
              </div>
              <button class="px-4 py-2 bg-white text-blue-600 rounded-full text-sm font-semibold">出示</button>
            </div>
          </section>
        </main>
        <nav class="tab-bar bg-white/90 px-6 flex items-center justify-between text-xs text-slate-500">
          <a class="flex flex-col items-center"><i class="fa-solid fa-house text-lg"></i><span class="mt-1">首页</span></a>
          <a class="flex flex-col items-center"><i class="fa-solid fa-book text-lg"></i><span class="mt-1">课程</span></a>
          <a class="flex flex-col items-center"><i class="fa-solid fa-newspaper text-lg"></i><span class="mt-1">资讯</span></a>
          <a class="flex flex-col items-center"><i class="fa-solid fa-grip text-lg"></i><span class="mt-1">服务</span></a>
          <a class="flex flex-col items-center text-blue-600"><i class="fa-solid fa-user text-lg"></i><span class="mt-1">我的</span></a>
        </nav>
      </div>
    </div>
  </body>
</html>
