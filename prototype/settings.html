<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>高校统一门户 - 设置中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1dQIxhFqefF5eDjK7uHk5j0i5dMGdg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <style>
      body {
        background: #e2e8f0;
        font-family: 'Inter', 'SF Pro Display', 'PingFang SC', sans-serif;
      }
      .device-frame {
        width: 393px;
        height: 852px;
        border-radius: 38px;
        overflow: hidden;
        box-shadow: 0 20px 45px rgba(15, 23, 42, 0.25);
        margin: 40px auto;
        border: 12px solid #111827;
        background: #f8fafc;
      }
      .status-bar {
        height: 44px;
        padding: 0 18px;
      }
      .tab-bar {
        height: 86px;
        border-top: 1px solid rgba(148, 163, 184, 0.35);
        backdrop-filter: blur(12px);
      }
      input[type='checkbox'] {
        accent-color: #2563eb;
      }
    </style>
  </head>
  <body>
    <div class="device-frame">
      <div class="flex flex-col h-full">
        <div class="status-bar flex items-end justify-between text-slate-900 text-[13px]">
          <span class="font-semibold">9:41</span>
          <div class="flex items-center space-x-1 text-[11px]">
            <i class="fa-solid fa-signal"></i>
            <i class="fa-solid fa-wifi"></i>
            <i class="fa-solid fa-battery-full"></i>
          </div>
        </div>
        <main class="flex-1 overflow-y-auto bg-gradient-to-b from-white to-slate-100 px-6 pb-6">
          <header class="mt-2 mb-4">
            <h1 class="text-2xl font-semibold text-slate-900">设置中心</h1>
            <p class="text-sm text-slate-500 mt-1">管理通知、隐私、安全和外观偏好。</p>
          </header>

          <section class="bg-white rounded-3xl shadow-sm mb-6">
            <div class="px-5 py-4 border-b border-slate-100">
              <h2 class="text-sm font-semibold text-slate-500 uppercase tracking-[0.3em]">通知</h2>
            </div>
            <div class="divide-y divide-slate-100">
              <label class="flex items-center justify-between px-5 py-4">
                <div>
                  <h3 class="text-base font-semibold text-slate-900">系统推送</h3>
                  <p class="text-xs text-slate-500">包括重要课务、审批结果、紧急公告</p>
                </div>
                <input type="checkbox" checked />
              </label>
              <label class="flex items-center justify-between px-5 py-4">
                <div>
                  <h3 class="text-base font-semibold text-slate-900">服务提醒</h3>
                  <p class="text-xs text-slate-500">工单进度、预约提醒、账单通知</p>
                </div>
                <input type="checkbox" checked />
              </label>
              <label class="flex items-center justify-between px-5 py-4">
                <div>
                  <h3 class="text-base font-semibold text-slate-900">活动推荐</h3>
                  <p class="text-xs text-slate-500">精选校园活动、社团招新、赛事提醒</p>
                </div>
                <input type="checkbox" />
              </label>
            </div>
          </section>

          <section class="bg-white rounded-3xl shadow-sm mb-6">
            <div class="px-5 py-4 border-b border-slate-100">
              <h2 class="text-sm font-semibold text-slate-500 uppercase tracking-[0.3em]">安全</h2>
            </div>
            <div class="divide-y divide-slate-100">
              <div class="flex items-center justify-between px-5 py-4">
                <div>
                  <h3 class="text-base font-semibold text-slate-900">二次验证</h3>
                  <p class="text-xs text-slate-500">登录时启用面部识别 + 动态口令</p>
                </div>
                <button class="px-3 py-1 bg-blue-100 text-blue-600 text-xs rounded-full">管理</button>
              </div>
              <div class="flex items-center justify-between px-5 py-4">
                <div>
                  <h3 class="text-base font-semibold text-slate-900">登录设备</h3>
                  <p class="text-xs text-slate-500">iPhone 15 Pro · iPad Air · Web 浏览器</p>
                </div>
                <button class="px-3 py-1 bg-blue-100 text-blue-600 text-xs rounded-full">查看</button>
              </div>
              <div class="flex items-center justify-between px-5 py-4">
                <div>
                  <h3 class="text-base font-semibold text-slate-900">隐私权限</h3>
                  <p class="text-xs text-slate-500">授权访问摄像头、麦克风、位置信息</p>
                </div>
                <button class="px-3 py-1 bg-blue-100 text-blue-600 text-xs rounded-full">调整</button>
              </div>
            </div>
          </section>

          <section class="bg-white rounded-3xl shadow-sm">
            <div class="px-5 py-4 border-b border-slate-100">
              <h2 class="text-sm font-semibold text-slate-500 uppercase tracking-[0.3em]">外观</h2>
            </div>
            <div class="divide-y divide-slate-100">
              <div class="flex items-center justify-between px-5 py-4">
                <div>
                  <h3 class="text-base font-semibold text-slate-900">系统主题</h3>
                  <p class="text-xs text-slate-500">浅色 / 深色 / 自动随时间</p>
                </div>
                <button class="px-3 py-1 bg-blue-600 text-white text-xs rounded-full">浅色</button>
              </div>
              <div class="flex items-center justify-between px-5 py-4">
                <div>
                  <h3 class="text-base font-semibold text-slate-900">桌面小组件</h3>
                  <p class="text-xs text-slate-500">选择常用信息展示：课表、成绩、工单</p>
                </div>
                <button class="px-3 py-1 bg-blue-100 text-blue-600 text-xs rounded-full">配置</button>
              </div>
              <div class="flex items-center justify-between px-5 py-4">
                <div>
                  <h3 class="text-base font-semibold text-slate-900">语音助手</h3>
                  <p class="text-xs text-slate-500">支持 Siri / 小度 / 小爱同学 快速操作</p>
                </div>
                <button class="px-3 py-1 bg-blue-100 text-blue-600 text-xs rounded-full">绑定</button>
              </div>
            </div>
          </section>
        </main>
        <nav class="tab-bar bg-white/90 px-6 flex items-center justify-between text-xs text-slate-500">
          <a class="flex flex-col items-center"><i class="fa-solid fa-house text-lg"></i><span class="mt-1">首页</span></a>
          <a class="flex flex-col items-center"><i class="fa-solid fa-book text-lg"></i><span class="mt-1">课程</span></a>
          <a class="flex flex-col items-center"><i class="fa-solid fa-newspaper text-lg"></i><span class="mt-1">资讯</span></a>
          <a class="flex flex-col items-center"><i class="fa-solid fa-grip text-lg"></i><span class="mt-1">服务</span></a>
          <a class="flex flex-col items-center text-blue-600"><i class="fa-solid fa-user text-lg"></i><span class="mt-1">我的</span></a>
        </nav>
      </div>
    </div>
  </body>
</html>
